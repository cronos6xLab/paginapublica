<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Laberinto - 3 Niveles</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background: #0f0c29;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
        }

        canvas {
            border: 3px solid #7c3aed;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.5), inset 0 0 30px rgba(124, 58, 237, 0.1);
        }

        .glow-text {
            text-shadow: 0 0 10px #a78bfa, 0 0 20px #7c3aed, 0 0 40px #5b21b6;
        }

        .btn-level {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-level::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: scale(0);
            transition: transform 0.5s;
        }

        .btn-level:hover::before {
            transform: scale(1);
        }

        .btn-level:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .pulse-ball {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .key-hint {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 10px;
            color: #a78bfa;
        }

        .mobile-btn {
            width: 56px;
            height: 56px;
            background: rgba(124, 58, 237, 0.4);
            border: 2px solid rgba(167, 139, 250, 0.5);
            border-radius: 12px;
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-btn:active {
            background: rgba(124, 58, 237, 0.8);
            transform: scale(0.92);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- PANTALLA DE INICIO -->
    <div id="menu" class="text-center fade-in">
        <h1 class="text-3xl md:text-4xl font-bold text-purple-300 glow-text mb-3 leading-relaxed">🏆 LABERINTO</h1>
        <p class="text-purple-400 text-xs mb-8 tracking-wider">Lleva la pelota hasta la meta</p>

        <div class="flex flex-col gap-4 items-center mb-8">
            <button onclick="startGame('easy')" class="btn-level bg-gradient-to-r from-green-600 to-emerald-500 text-white px-8 py-4 rounded-xl text-sm w-64 shadow-lg shadow-green-900/40 cursor-pointer">
                🟢 FÁCIL
                <span class="block text-[10px] mt-1 opacity-75">Laberinto 8×8</span>
            </button>
            <button onclick="startGame('medium')" class="btn-level bg-gradient-to-r from-yellow-600 to-amber-500 text-white px-8 py-4 rounded-xl text-sm w-64 shadow-lg shadow-yellow-900/40 cursor-pointer">
                🟡 MEDIO
                <span class="block text-[10px] mt-1 opacity-75">Laberinto 12×12</span>
            </button>
            <button onclick="startGame('hard')" class="btn-level bg-gradient-to-r from-red-600 to-rose-500 text-white px-8 py-4 rounded-xl text-sm w-64 shadow-lg shadow-red-900/40 cursor-pointer">
                🔴 DIFÍCIL
                <span class="block text-[10px] mt-1 opacity-75">Laberinto 16×16</span>
            </button>
        </div>

        <div class="flex gap-4 justify-center flex-wrap">
            <div class="key-hint">⬆⬇⬅➡ Mover</div>
            <div class="key-hint">WASD Alternativo</div>
            <div class="key-hint">📱 Touch Soportado</div>
        </div>
    </div>

    <!-- PANTALLA DE JUEGO -->
    <div id="game" class="hidden text-center fade-in">
        <div class="flex items-center justify-between mb-4 w-full max-w-lg mx-auto px-2">
            <button onclick="backToMenu()" class="text-purple-400 hover:text-white text-xs cursor-pointer transition-colors">◀ MENÚ</button>
            <div>
                <span id="levelLabel" class="text-purple-300 text-xs"></span>
            </div>
            <div class="text-right">
                <span class="text-purple-500 text-[10px]">TIEMPO</span>
                <span id="timer" class="text-purple-300 text-xs block">00:00</span>
            </div>
        </div>

        <canvas id="mazeCanvas"></canvas>

        <div class="flex items-center justify-between mt-4 w-full max-w-lg mx-auto px-2">
            <span id="movesLabel" class="text-purple-500 text-[10px]">MOVIMIENTOS: <span id="moves" class="text-purple-300">0</span></span>
            <button onclick="restartLevel()" class="text-yellow-400 hover:text-yellow-200 text-[10px] cursor-pointer transition-colors">🔄 REINICIAR</button>
        </div>

        <!-- Controles móviles -->
        <div id="mobileControls" class="mt-6 md:hidden">
            <div class="flex flex-col items-center gap-1">
                <div class="mobile-btn" ontouchstart="handleMobileBtn(event,'up')" onmousedown="handleMobileBtn(event,'up')">▲</div>
                <div class="flex gap-1">
                    <div class="mobile-btn" ontouchstart="handleMobileBtn(event,'left')" onmousedown="handleMobileBtn(event,'left')">◀</div>
                    <div class="mobile-btn" ontouchstart="handleMobileBtn(event,'down')" onmousedown="handleMobileBtn(event,'down')">▼</div>
                    <div class="mobile-btn" ontouchstart="handleMobileBtn(event,'right')" onmousedown="handleMobileBtn(event,'right')">➤</div>
                </div>
            </div>
        </div>
    </div>

    <!-- PANTALLA DE VICTORIA -->
    <div id="winScreen" class="hidden text-center fade-in">
        <div class="confetti-container" id="confettiContainer"></div>
        <h2 class="text-3xl md:text-4xl font-bold text-yellow-300 glow-text mb-4">🎉 ¡GANASTE!</h2>
        <div class="bg-white/5 backdrop-blur rounded-xl p-6 mb-6 border border-white/10 max-w-sm mx-auto">
            <p id="winLevel" class="text-purple-300 text-xs mb-3"></p>
            <p class="text-purple-500 text-[10px] mb-1">⏱ TIEMPO</p>
            <p id="winTime" class="text-white text-lg mb-3"></p>
            <p class="text-purple-500 text-[10px] mb-1">👣 MOVIMIENTOS</p>
            <p id="winMoves" class="text-white text-lg mb-3"></p>
            <p id="winStars" class="text-3xl mb-1"></p>
            <p id="winRating" class="text-purple-400 text-[10px]"></p>
        </div>
        <div class="flex gap-3 justify-center flex-wrap">
            <button onclick="restartLevel()" class="btn-level bg-gradient-to-r from-purple-600 to-violet-500 text-white px-6 py-3 rounded-xl text-xs cursor-pointer shadow-lg">🔄 REPETIR</button>
            <button onclick="backToMenu()" class="btn-level bg-gradient-to-r from-indigo-600 to-blue-500 text-white px-6 py-3 rounded-xl text-xs cursor-pointer shadow-lg">📋 MENÚ</button>
        </div>
    </div>

    <script>
        // ===================== CONFIGURACIÓN =====================
        const CONFIG = {
            easy:   { cols: 8,  rows: 8,  label: '🟢 FÁCIL (8×8)',   color: '#10b981', starTime: [30, 60], starMoves: [40, 70] },
            medium: { cols: 12, rows: 12, label: '🟡 MEDIO (12×12)', color: '#f59e0b', starTime: [60, 120], starMoves: [80, 140] },
            hard:   { cols: 16, rows: 16, label: '🔴 DIFÍCIL (16×16)', color: '#ef4444', starTime: [120, 240], starMoves: [150, 260] }
        };

        let canvas, ctx;
        let currentLevel = null;
        let maze = [];
        let player = { x: 0, y: 0 };
        let goal = { x: 0, y: 0 };
        let cellSize = 0;
        let moveCount = 0;
        let timerInterval = null;
        let startTime = 0;
        let gameActive = false;
        let playerAnimOffset = 0;
        let animFrame = null;

        // ===================== GENERACIÓN DE LABERINTO (Recursive Backtracker) =====================
        function generateMaze(cols, rows) {
            // Cada celda: { top, right, bottom, left, visited }
            const grid = [];
            for (let y = 0; y < rows; y++) {
                grid[y] = [];
                for (let x = 0; x < cols; x++) {
                    grid[y][x] = { top: true, right: true, bottom: true, left: true, visited: false };
                }
            }

            const stack = [];
            const startX = 0, startY = 0;
            grid[startY][startX].visited = true;
            stack.push({ x: startX, y: startY });

            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                const neighbors = [];

                const dirs = [
                    { dx: 0, dy: -1, wall: 'top', opposite: 'bottom' },
                    { dx: 1, dy: 0, wall: 'right', opposite: 'left' },
                    { dx: 0, dy: 1, wall: 'bottom', opposite: 'top' },
                    { dx: -1, dy: 0, wall: 'left', opposite: 'right' }
                ];

                for (const d of dirs) {
                    const nx = current.x + d.dx;
                    const ny = current.y + d.dy;
                    if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !grid[ny][nx].visited) {
                        neighbors.push({ x: nx, y: ny, wall: d.wall, opposite: d.opposite });
                    }
                }

                if (neighbors.length > 0) {
                    const chosen = neighbors[Math.floor(Math.random() * neighbors.length)];
                    grid[current.y][current.x][chosen.wall] = false;
                    grid[chosen.y][chosen.x][chosen.opposite] = false;
                    grid[chosen.y][chosen.x].visited = true;
                    stack.push({ x: chosen.x, y: chosen.y });
                } else {
                    stack.pop();
                }
            }

            return grid;
        }

        // ===================== DIBUJO =====================
        function drawMaze() {
            const cfg = CONFIG[currentLevel];
            const cols = cfg.cols;
            const rows = cfg.rows;

            // Fondo
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid sutil
            ctx.strokeStyle = 'rgba(124, 58, 237, 0.06)';
            ctx.lineWidth = 1;
            for (let y = 0; y <= rows; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * cellSize);
                ctx.lineTo(cols * cellSize, y * cellSize);
                ctx.stroke();
            }
            for (let x = 0; x <= cols; x++) {
                ctx.beginPath();
                ctx.moveTo(x * cellSize, 0);
                ctx.lineTo(x * cellSize, rows * cellSize);
                ctx.stroke();
            }

            // Paredes
            ctx.strokeStyle = '#7c3aed';
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const cell = maze[y][x];
                    const px = x * cellSize;
                    const py = y * cellSize;

                    if (cell.top) {
                        ctx.beginPath();
                        ctx.moveTo(px, py);
                        ctx.lineTo(px + cellSize, py);
                        ctx.stroke();
                    }
                    if (cell.right) {
                        ctx.beginPath();
                        ctx.moveTo(px + cellSize, py);
                        ctx.lineTo(px + cellSize, py + cellSize);
                        ctx.stroke();
                    }
                    if (cell.bottom) {
                        ctx.beginPath();
                        ctx.moveTo(px, py + cellSize);
                        ctx.lineTo(px + cellSize, py + cellSize);
                        ctx.stroke();
                    }
                    if (cell.left) {
                        ctx.beginPath();
                        ctx.moveTo(px, py);
                        ctx.lineTo(px, py + cellSize);
                        ctx.stroke();
                    }
                }
            }

            // Meta (bandera)
            const gx = goal.x * cellSize + cellSize / 2;
            const gy = goal.y * cellSize + cellSize / 2;
            const gr = cellSize * 0.32;

            // Glow de la meta
            const goalGlow = ctx.createRadialGradient(gx, gy, 0, gx, gy, gr * 2.5);
            goalGlow.addColorStop(0, 'rgba(16, 185, 129, 0.3)');
            goalGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = goalGlow;
            ctx.fillRect(gx - gr * 3, gy - gr * 3, gr * 6, gr * 6);

            // Cuadrado meta
            ctx.fillStyle = '#10b981';
            ctx.shadowColor = '#10b981';
            ctx.shadowBlur = 12;
            ctx.fillRect(gx - gr, gy - gr, gr * 2, gr * 2);
            ctx.shadowBlur = 0;

            // Banderita
            ctx.fillStyle = '#fff';
            ctx.font = `${cellSize * 0.45}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🏁', gx, gy);

            // Pelota (jugador)
            const bx = player.x * cellSize + cellSize / 2;
            const by = player.y * cellSize + cellSize / 2;
            const br = cellSize * 0.3;

            // Glow pelota
            const ballGlow = ctx.createRadialGradient(bx, by, 0, bx, by, br * 2.5);
            ballGlow.addColorStop(0, `${cfg.color}66`);
            ballGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = ballGlow;
            ctx.beginPath();
            ctx.arc(bx, by, br * 2.5, 0, Math.PI * 2);
            ctx.fill();

            // Pelota
            const ballGrad = ctx.createRadialGradient(bx - br * 0.3, by - br * 0.3, br * 0.1, bx, by, br);
            ballGrad.addColorStop(0, '#ffffff');
            ballGrad.addColorStop(0.5, cfg.color);
            ballGrad.addColorStop(1, darkenColor(cfg.color, 40));
            ctx.fillStyle = ballGrad;
            ctx.shadowColor = cfg.color;
            ctx.shadowBlur = 15 + Math.sin(playerAnimOffset) * 5;
            ctx.beginPath();
            ctx.arc(bx, by, br, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Brillo en la pelota
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            ctx.beginPath();
            ctx.arc(bx - br * 0.25, by - br * 0.25, br * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }

        function darkenColor(hex, amount) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            r = Math.max(0, r - amount);
            g = Math.max(0, g - amount);
            b = Math.max(0, b - amount);
            return `rgb(${r},${g},${b})`;
        }

        function animate() {
            playerAnimOffset += 0.05;
            drawMaze();
            animFrame = requestAnimationFrame(animate);
        }

        // ===================== MOVIMIENTO =====================
        function movePlayer(dx, dy) {
            if (!gameActive) return;
            const nx = player.x + dx;
            const ny = player.y + dy;
            const cfg = CONFIG[currentLevel];

            if (nx < 0 || nx >= cfg.cols || ny < 0 || ny >= cfg.rows) return;

            // Verificar paredes
            const cell = maze[player.y][player.x];
            if (dx === 1 && cell.right) return;
            if (dx === -1 && cell.left) return;
            if (dy === 1 && cell.bottom) return;
            if (dy === -1 && cell.top) return;

            player.x = nx;
            player.y = ny;
            moveCount++;
            document.getElementById('moves').textContent = moveCount;

            // ¿Ganó?
            if (player.x === goal.x && player.y === goal.y) {
                winGame();
            }
        }

        // ===================== CONTROLES =====================
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    e.preventDefault(); movePlayer(0, -1); break;
                case 'ArrowDown': case 's': case 'S':
                    e.preventDefault(); movePlayer(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A':
                    e.preventDefault(); movePlayer(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D':
                    e.preventDefault(); movePlayer(1, 0); break;
            }
        });

        function handleMobileBtn(e, dir) {
            e.preventDefault();
            switch(dir) {
                case 'up': movePlayer(0, -1); break;
                case 'down': movePlayer(0, 1); break;
                case 'left': movePlayer(-1, 0); break;
                case 'right': movePlayer(1, 0); break;
            }
        }

        // Swipe support
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            if (e.target.closest('.mobile-btn') || e.target.closest('button')) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            if (e.target.closest('.mobile-btn') || e.target.closest('button')) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);
            if (Math.max(absDx, absDy) < 20) return;
            if (absDx > absDy) {
                movePlayer(dx > 0 ? 1 : -1, 0);
            } else {
                movePlayer(0, dy > 0 ? 1 : -1);
            }
        }, { passive: true });

        // ===================== TEMPORIZADOR =====================
        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const secs = String(elapsed % 60).padStart(2, '0');
            document.getElementById('timer').textContent = `${mins}:${secs}`;
        }

        // ===================== FLUJO DEL JUEGO =====================
        function startGame(level) {
            currentLevel = level;
            const cfg = CONFIG[level];

            // Generar laberinto
            maze = generateMaze(cfg.cols, cfg.rows);

            // Posiciones
            player = { x: 0, y: 0 };
            goal = { x: cfg.cols - 1, y: cfg.rows - 1 };

            // Canvas
            canvas = document.getElementById('mazeCanvas');
            ctx = canvas.getContext('2d');

            // Calcular tamaño del canvas
            const maxSize = Math.min(window.innerWidth - 40, 520);
            cellSize = Math.floor(maxSize / Math.max(cfg.cols, cfg.rows));
            canvas.width = cfg.cols * cellSize;
            canvas.height = cfg.rows * cellSize;

            // UI
            document.getElementById('levelLabel').textContent = cfg.label;
            moveCount = 0;
            document.getElementById('moves').textContent = '0';
            document.getElementById('timer').textContent = '00:00';

            // Mostrar juego
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('winScreen').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            document.getElementById('game').classList.add('fade-in');

            // Timer
            startTime = Date.now();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);

            gameActive = true;

            // Animación
            if (animFrame) cancelAnimationFrame(animFrame);
            animate();
        }

        function winGame() {
            gameActive = false;
            clearInterval(timerInterval);
            if (animFrame) cancelAnimationFrame(animFrame);

            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const cfg = CONFIG[currentLevel];

            // Calcular estrellas
            let stars = 1;
            if (elapsed <= cfg.starTime[0] && moveCount <= cfg.starMoves[0]) stars = 3;
            else if (elapsed <= cfg.starTime[1] && moveCount <= cfg.starMoves[1]) stars = 2;

            const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const secs = String(elapsed % 60).padStart(2, '0');

            document.getElementById('winLevel').textContent = cfg.label;
            document.getElementById('winTime').textContent = `${mins}:${secs}`;
            document.getElementById('winMoves').textContent = moveCount;
            document.getElementById('winStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);

            const ratings = ['Puedes mejorar...', '¡Bien hecho!', '¡PERFECTO! 🏆'];
            document.getElementById('winRating').textContent = ratings[stars - 1];

            // Mostrar pantalla de victoria
            document.getElementById('game').classList.add('hidden');
            document.getElementById('winScreen').classList.remove('hidden');
            document.getElementById('winScreen').classList.add('fade-in');

            // Confeti
            launchConfetti();
        }

        function restartLevel() {
            if (currentLevel) startGame(currentLevel);
        }

        function backToMenu() {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            if (animFrame) cancelAnimationFrame(animFrame);

            document.getElementById('game').classList.add('hidden');
            document.getElementById('winScreen').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
            document.getElementById('menu').classList.add('fade-in');

            // Limpiar confeti
            document.getElementById('confettiContainer').innerHTML = '';
        }

        // ===================== CONFETI =====================
        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            const colors = ['#f59e0b', '#ef4444', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899', '#14b8a6'];
            const emojis = ['🎉', '🎊', '✨', '🌟', '💫', '🏆'];

            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                const isEmoji = Math.random() > 0.6;

                if (isEmoji) {
                    confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    confetti.style.fontSize = (12 + Math.random() * 16) + 'px';
                } else {
                    confetti.style.width = (6 + Math.random() * 8) + 'px';
                    confetti.style.height = (6 + Math.random() * 8) + 'px';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                }

                confetti.style.position = 'absolute';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-20px';
                confetti.style.opacity = '1';
                confetti.style.pointerEvents = 'none';

                const duration = 2 + Math.random() * 3;
                const delay = Math.random() * 1.5;
                const rotEnd = Math.random() * 720 - 360;
                const xDrift = (Math.random() - 0.5) * 200;

                confetti.style.animation = `confettiFall ${duration}s ${delay}s ease-out forwards`;
                confetti.style.setProperty('--x-drift', xDrift + 'px');
                confetti.style.setProperty('--rot-end', rotEnd + 'deg');

                container.appendChild(confetti);
            }

            // Inject keyframes if not done yet
            if (!document.getElementById('confettiStyle')) {
                const style = document.createElement('style');
                style.id = 'confettiStyle';
                style.textContent = `
                    @keyframes confettiFall {
                        0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
                        100% { transform: translateY(100vh) translateX(var(--x-drift)) rotate(var(--rot-end)); opacity: 0; }
                    }
                `;
                document.head.appendChild(style);
            }
        }

        // Resize handler
        window.addEventListener('resize', () => {
            if (gameActive && currentLevel) {
                const cfg = CONFIG[currentLevel];
                const maxSize = Math.min(window.innerWidth - 40, 520);
                cellSize = Math.floor(maxSize / Math.max(cfg.cols, cfg.rows));
                canvas.width = cfg.cols * cellSize;
                canvas.height = cfg.rows * cellSize;
            }
        });
    </script>
</body>
</html>
